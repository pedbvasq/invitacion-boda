<section id="wedding" class="wedding-section">
  <!-- Flor superior derecha -->
  <img src="/flower_top.png" class="flower flower-top" alt="Flor decorativa" />

  <!-- Contenido central -->
  <div class="wedding-content">
    <p class="romantic-phrase">
      El amor nos trajo hasta aquí, y el destino nos une para siempre
    </p>

    <h2 class="section-title">Nuestro matrimonio</h2>

    <h3 class="names">Hugo & María</h3>

    <p class="save-date">Guarda esta fecha</p>

    <div class="date-box">
      <span class="date-main">07 · Agosto · 2026</span>
      <span class="date-sub">Viernes · 19:00</span>
    </div>

    <!-- Contador -->
<div class="countdown">
  <div class="time-box">
    <span class="number">{{ days() }}</span>
    <span class="label">Días</span>
  </div>

  <div class="time-box">
    <span class="number">{{ hours() }}</span>
    <span class="label">Horas</span>
  </div>

  <div class="time-box">
    <span class="number">{{ minutes() }}</span>
    <span class="label">Min</span>
  </div>

  <div class="time-box">
    <span class="number">{{ seconds() }}</span>
    <span class="label">Seg</span>
  </div>
</div>


  </div>

  <!-- Flor inferior izquierda -->
  <img src="/flower_bottom.png" class="flower flower-bottom" alt="Flor decorativa" />
</section>
